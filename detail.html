      function generateAcademicExamples(phrase) {
        const safePhrase = phrase || "this collocation";
        return [
          `The authors employ the collocation "${safePhrase}" to signal a precise academic relationship.`,

          `When discussing methodology, scholars often use "${safePhrase}" to convey a strong analytical point.`,
          `The expression "${safePhrase}" appears repeatedly in academic discourse because it communicates nuance and precision.`,
          `By choosing "${safePhrase}" carefully, writers can strengthen the credibility of their analysis.`
        ];

      const topicTitle = params.get("topic") || "Research & investigation";
      const topic = topics.find((entry) => entry.title === topicTitle) || topics[0];

      document.getElementById("topic-title").textContent = topic.title;

      const collocationsList = document.getElementById("collocations-list");
      collocationsList.innerHTML = topic.collocations
        .map((phrase) => `<li>${phrase}</li>`)
        .join("");

      const container = document.getElementById("examples");
      container.innerHTML = topic.collocations

          const examples = (topic.examples && topic.examples[phrase]) || generateAcademicExamples(phrase);
          const items = examples
            .map((sentence) => `<li class="example">${sentence}</li>`)
            .join("");
          return `
            <section class="phrase-block">
              <h3>${phrase}</h3>
              <ol class="examples">${items}</ol>
            </section>

        })
