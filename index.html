<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PTE Collocations</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #2563eb;
        --accent-soft: #dbeafe;
        --border: #dbe3ef;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
      }

      .intro {
        margin: 0 0 24px;
        color: var(--muted);
        max-width: 760px;
        line-height: 1.6;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }

      .topic-btn {
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
        border-radius: 14px;
        padding: 16px;
        text-align: left;
        cursor: pointer;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      }

      .topic-btn:hover {
        transform: translateY(-2px);
        border-color: var(--accent);
        box-shadow: 0 12px 24px rgba(37, 99, 235, 0.1);
      }

      .topic-btn.active {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .topic-title {
        font-weight: 700;
        font-size: 1rem;
        margin-bottom: 6px;
      }

      .topic-count {
        font-size: 0.9rem;
        color: var(--muted);
      }

      .panel {
        display: none;
        margin-top: 16px;
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--card);
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
      }

      .panel.open {
        display: block;
      }

      .list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
        padding: 0;
        margin: 0;
        list-style: none;
      }

      .list li {
        padding: 10px 12px;
        border-radius: 10px;
        background: #f8fafc;
        border: 1px solid #e5e7eb;
        line-height: 1.4;
      }

      .collocation-item {
        cursor: pointer;
        transition: background 0.2s ease, border-color 0.2s ease;
      }

      .collocation-item:hover {
        background: #eef4ff;
        border-color: #93c5fd;
      }

      @media (max-width: 640px) {
        .page { padding: 24px 14px 36px; }
        h1 { font-size: 1.6rem; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>PTE Collocations</h1>
    
      <div class="grid" id="buttons"></div>
    </main>

    <script>
      const topics = [
        {
          title: "Research & investigation",
          collocations: [
            "conduct research",
            "carry out a study",
            "gather data",
            "analyze data",
            "draw conclusions",
            "present findings",
            "review the literature",
            "address the issue",
            "investigate the phenomenon",
            "examine the evidence"
          ]
        },
        {
          title: "Presenting arguments & opinions",
          collocations: [
            "put forward an argument",
            "present a viewpoint",
            "hold the view",
            "express an opinion",
            "raise concerns",
            "make a case",
            "take a stance",
            "offer insight",
            "support the claim",
            "challenge the assumption"
          ]
        },
        {
          title: "Analysis & discussion",
          collocations: [
            "play a crucial role",
            "shed light on",
            "take into account",
            "bear in mind",
            "focus attention on",
            "draw a distinction",
            "establish a link",
            "identify patterns",
            "highlight the importance",
            "raise questions"
          ]
        },
        {
          title: "Cause & effect",
          collocations: [
            "have an impact on",
            "exert influence",
            "give rise to",
            "lead to consequences",
            "bring about change",
            "contribute to development",
            "result from factors",
            "cause concern",
            "produce results",
            "trigger a response"
          ]
        },
        {
          title: "Evidence & support",
          collocations: [
            "provide evidence",
            "cite examples",
            "draw on research",
            "offer proof",
            "back up a claim",
            "support the argument",
            "rely on data",
            "present statistics",
            "reference sources",
            "confirm the hypothesis"
          ]
        },
        {
          title: "Comparison & contrast",
          collocations: [
            "draw a comparison",
            "make a distinction",
            "share similarities",
            "bear resemblance to",
            "differ significantly",
            "contrast sharply",
            "correspond closely",
            "diverge from",
            "align with",
            "deviate from"
          ]
        },
        {
          title: "Change & development",
          collocations: [
            "undergo change",
            "experience growth",
            "bring about improvement",
            "facilitate progress",
            "drive innovation",
            "spark development",
            "accelerate growth",
            "hinder progress",
            "promote awareness",
            "foster understanding"
          ]
        },
        {
          title: "Emphasis & degree",
          collocations: [
            "play a significant role",
            "exert considerable influence",
            "show a marked increase",
            "reach a peak",
            "witness a decline",
            "gain popularity",
            "attract attention",
            "receive recognition",
            "carry weight",
            "hold significance"
          ]
        },
        {
          title: "Conclusion & recommendation",
          collocations: [
            "reach a conclusion",
            "draw an inference",
            "make a recommendation",
            "propose a solution",
            "suggest an approach",
            "offer a perspective",
            "summarize findings",
            "weigh the evidence",
            "consider implications",
            "address limitations"
          ]
        },
        {
          title: "High-frequency adjective + noun pairs",
          collocations: [
            "significant impact",
            "widespread concern",
            "compelling evidence",
            "viable solution",
            "profound effect",
            "underlying cause",
            "potential consequences",
            "valuable insight",
            "fundamental principle",
            "comprehensive analysis"
          ]
        },
        {
          title: "Hedging & cautious language (high-band boost)",
          collocations: [
            "it could be argued that",
            "it is widely believed that",
            "it appears that",
            "it seems likely that",
            "this suggests that",
            "this indicates that",
            "one possible explanation",
            "to a certain extent",
            "in most cases",
            "tends to suggest"
          ]
        },
        {
          title: "Linking & signposting",
          collocations: [
            "in addition to this",
            "furthermore, it should be noted",
            "moreover, evidence suggests",
            "on the other hand",
            "in contrast to this",
            "despite this fact",
            "as a consequence",
            "for this reason",
            "in light of this",
            "with regard to"
          ]
        },
        {
          title: "Problem & solution",
          collocations: [
            "tackle the problem",
            "address the challenge",
            "overcome the obstacle",
            "resolve the issue",
            "mitigate the risk",
            "alleviate the burden",
            "combat the problem",
            "find a remedy",
            "implement measures",
            "adopt strategies"
          ]
        },
        {
          title: "Trends & statistics (for graph/essay tasks)",
          collocations: [
            "show an upward trend",
            "experience a sharp rise",
            "remain relatively stable",
            "fluctuate significantly",
            "reach an all-time high",
            "hit a record low",
            "show a steady increase",
            "undergo a dramatic shift",
            "see a gradual decline",
            "record substantial growth"
          ]
        },
        {
          title: "Society & policy topics",
          collocations: [
            "shape public opinion",
            "raise public awareness",
            "implement policies",
            "enforce regulations",
            "impose restrictions",
            "allocate resources",
            "address inequality",
            "bridge the gap",
            "promote social cohesion",
            "safeguard rights"
          ]
        },
        {
          title: "Education topics",
          collocations: [
            "acquire knowledge",
            "develop skills",
            "broaden horizons",
            "foster creativity",
            "instill values",
            "pursue higher education",
            "meet academic standards",
            "bridge the skills gap",
            "equip students with",
            "enhance learning outcomes"
          ]
        },
        {
          title: "Technology topics",
          collocations: [
            "embrace technology",
            "adopt innovations",
            "transform industries",
            "streamline processes",
            "raise privacy concerns",
            "pose ethical questions",
            "revolutionize the way",
            "narrow the digital divide",
            "harness the potential",
            "keep pace with change"
          ]
        },
        {
          title: "Environment topics",
          collocations: [
            "reduce carbon emissions",
            "combat climate change",
            "protect biodiversity",
            "deplete natural resources",
            "adopt sustainable practices",
            "raise environmental awareness",
            "minimize environmental impact",
            "preserve ecosystems",
            "transition to renewables",
            "tackle pollution"
          ]
        },
        {
          title: "Health topics",
          collocations: [
            "maintain a healthy lifestyle",
            "reduce the risk of",
            "improve wellbeing",
            "tackle obesity",
            "raise health awareness",
            "access healthcare services",
            "adopt healthy habits",
            "address mental health",
            "prevent chronic disease",
            "promote physical activity"
          ]
        },
        {
          title: "Higher-band verb + noun pairs",
          collocations: [
            "broaden understanding",
            "reinforce the notion",
            "underscore the importance",
            "cast doubt on",
            "call into question",
            "lay the foundation for",
            "pave the way for",
            "yield results",
            "warrant further investigation",
            "bear significant implications"
          ]
        }
      ];

      const buttonsContainer = document.getElementById("buttons");

      topics.forEach((topic, index) => {
        const button = document.createElement("button");
        button.className = "topic-btn";
        button.setAttribute("type", "button");
        button.innerHTML = `<div class="topic-title">${topic.title}</div>`;

        button.addEventListener("click", () => {
          window.location.href = `detail.html?topic=${encodeURIComponent(topic.title)}`;
        });

        buttonsContainer.appendChild(button);

        const panel = document.createElement("section");
        panel.id = `panel-${index}`;
        panel.className = "panel";
        panel.dataset.index = index;
        panel.innerHTML = `
          <ul class="list">
            ${topic.collocations.map((phrase) => `<li class="collocation-item" data-phrase="${phrase}">${phrase}</li>`).join("")}
          </ul>
        `;
        buttonsContainer.parentNode.insertBefore(panel, buttonsContainer.nextSibling);

        panel.querySelectorAll(".collocation-item").forEach((item) => {
          item.addEventListener("click", () => {
            const phrase = item.getAttribute("data-phrase");
            window.open(`detail.html?phrase=${encodeURIComponent(phrase)}`, "_blank", "noopener,noreferrer");
          });
        });
      });
    </script>
  </body>
</html>
